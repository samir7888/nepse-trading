name: NEPSE Trading System

on:
  schedule:
    # Run every 2 days at 3:15 AM UTC (9:00 AM Nepal Time)
    - cron: "15 3 */2 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  run-trading-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install backend dependencies
        run: |
          if [ -d "backend" ]; then
            echo "✅ Backend directory found"
            cd backend
            
            # Install basic dependencies first
            echo "📦 Installing basic dependencies..."
            pip install fastapi uvicorn websockets
            
            # Install nepse package
            echo "📦 Installing nepse package..."
            pip install git+https://github.com/basic-bgnr/NepseUnofficialApi.git@dev
            
            # Install additional dependencies that might be needed
            echo "📦 Installing additional dependencies..."
            pip install aiohttp requests pandas numpy || echo "Some optional dependencies failed"
            
            # Try to install from requirements.txt if it exists
            if [ -f "requirements.txt" ]; then
              echo "📦 Installing from requirements.txt..."
              pip install -r requirements.txt || echo "Requirements.txt installation failed, continuing..."
            fi
            
            # Install the backend package itself to handle local imports
            if [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
              echo "📦 Installing backend package for local imports..."
              pip install -e . || echo "Backend package install failed, continuing..."
            fi
            
            echo "✅ Backend dependencies installation completed"
          else
            echo "❌ Backend directory not found!"
            echo "Available directories:"
            ls -la
            exit 1
          fi

      - name: Start backend server in background
        run: |
          cd backend
          echo "🔍 Checking backend files..."
          ls -la
          echo "🔍 Testing server import..."
          python -c "import server; print('✅ Server import successful')" || echo "❌ Server import failed"
          echo "🚀 Starting backend server..."
          python -m uvicorn server:app --host 0.0.0.0 --port 8000 --log-level debug &
          echo $! > server.pid
          sleep 15  # Give server time to start
          echo "📊 Server process status:"
          ps aux | grep uvicorn || echo "No uvicorn process found"

      - name: Verify backend is running
        run: |
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Backend server is running"
              echo "BACKEND_RUNNING=true" >> $GITHUB_ENV
              break
            fi
            echo "⏳ Waiting for backend... ($i/30)"
            sleep 2
          done
          # Final check
          if ! curl -f http://localhost:8000/health > /dev/null 2>&1; then
            echo "❌ Backend failed to start, will try alternative approach"
            echo "BACKEND_RUNNING=false" >> $GITHUB_ENV
          fi

      - name: Run trading system
        run: |
          if [ "$BACKEND_RUNNING" = "true" ]; then
            echo "✅ Running with local backend server"
            python beginner_trading_system.py > trading_output.txt 2>&1
          else
            echo "⚠️ Backend not available, trying alternative approach"
            # You could add fallback logic here or modify the trading system
            # For now, we'll still try to run it as it might work with external APIs
            python beginner_trading_system.py > trading_output.txt 2>&1 || echo "Trading system failed, will send error report"
          fi

      - name: Stop backend server
        run: |
          if [ -f backend/server.pid ]; then
            kill $(cat backend/server.pid) || true
          fi

      - name: Send email with results
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          python send_trading_email.py

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trading-output
          path: |
            trading_output.txt
            output/
