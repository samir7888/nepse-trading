name: NEPSE Trading System

on:
  schedule:
    # Run every 2 days at 3:15 AM UTC (9:00 AM Nepal Time)
    - cron: "15 3 */2 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  run-trading-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install backend dependencies
        run: |
          if [ -d "backend" ]; then
            echo "✅ Backend directory found"
            cd backend
            if [ -f "requirements.txt" ]; then
              echo "✅ Installing backend requirements..."
              pip install -r requirements.txt
            else
              echo "⚠️ No requirements.txt found in backend, installing basic dependencies..."
              pip install fastapi uvicorn websockets
              pip install git+https://github.com/basic-bgnr/NepseUnofficialApi.git@dev
            fi
            if [ -f "pyproject.toml" ]; then
              echo "📦 Installing backend package..."
              pip install . || echo "Backend package install failed, continuing..."
            fi
          else
            echo "❌ Backend directory not found!"
            echo "Available directories:"
            ls -la
            exit 1
          fi

      - name: Start backend server in background
        run: |
          cd backend
          python -m uvicorn server:app --host 0.0.0.0 --port 8000 &
          echo $! > server.pid
          sleep 15  # Give server time to start

      - name: Verify backend is running
        run: |
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Backend server is running"
              break
            fi
            echo "⏳ Waiting for backend... ($i/30)"
            sleep 2
          done
          # Final check
          curl -f http://localhost:8000/health || (echo "❌ Backend failed to start" && exit 1)

      - name: Run trading system
        run: |
          python beginner_trading_system.py > trading_output.txt 2>&1

      - name: Stop backend server
        run: |
          if [ -f backend/server.pid ]; then
            kill $(cat backend/server.pid) || true
          fi

      - name: Send email with results
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          python send_trading_email.py

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trading-output
          path: |
            trading_output.txt
            output/
